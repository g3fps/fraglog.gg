<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fraglog.gg — Coaching Data</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #FF4655;
  --darker: #080E14;
  --surface: #151E27;
  --surface2: #1C2733;
  --border: rgba(255,255,255,0.08);
  --text: #ECE8E1;
  --muted: #7B8FA1;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--darker); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding: 2rem; }

header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
.logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.logo span { color: var(--red); }
.badge { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; background: rgba(255,70,85,0.15); color: var(--red); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(255,70,85,0.3); }

.container { max-width: 900px; margin: 0 auto; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }

.filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
.filters select, .filters button {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  outline: none;
}
.filters select:focus { border-color: rgba(255,70,85,0.5); }
.filters button { transition: all 0.15s; }
.filters button:hover { border-color: var(--red); color: var(--red); }
.filters button.active { background: rgba(255,70,85,0.15); border-color: rgba(255,70,85,0.4); color: var(--red); }

.stat { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }

.entry { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.entry-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; border: 1px solid; }
.tag-mode { color: var(--muted); border-color: var(--border); }
.tag-agent { color: #7EC8E3; border-color: rgba(126,200,227,0.3); }
.tag-map { color: #A8C5A0; border-color: rgba(168,197,160,0.3); }
.tag-shared { color: #6BCF6B; border-color: rgba(107,207,107,0.3); background: rgba(107,207,107,0.08); }
.tag-private { color: var(--muted); border-color: var(--border); }
.entry-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-left: auto; }

.entry-section { margin-top: 10px; }
.entry-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.entry-body {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  background: var(--darker);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  white-space: pre-wrap;
  word-break: break-word;
}
.entry-body.collapsed { max-height: 80px; overflow: hidden; position: relative; }
.entry-body.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 30px;
  background: linear-gradient(transparent, var(--darker));
}
.expand-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  padding: 4px 0;
  margin-top: 4px;
}
.expand-btn:hover { opacity: 0.7; }

.empty { text-align: center; padding: 3rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }

.load-more {
  width: 100%;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 4px;
  transition: all 0.15s;
}
.load-more:hover { border-color: var(--red); color: var(--red); }
.load-more:disabled { opacity: 0.4; cursor: not-allowed; }

.signin-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; display: none; }
.signin-card input {
  width: 100%;
  background: var(--darker);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  border-radius: 8px;
  outline: none;
  margin-bottom: 10px;
}
.signin-card input:focus { border-color: rgba(255,70,85,0.5); }
.btn-primary {
  width: 100%;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--red);
  color: #fff;
  border: none;
  padding: 11px;
  border-radius: 8px;
  cursor: pointer;
}
.btn-primary:hover { background: #e03040; }
.auth-error { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--red); margin-top: 8px; min-height: 14px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">fraglog<span>.</span>gg</div>
    <div class="badge">coaching data</div>
    <div id="auth-status" style="margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">Connecting...</div>
  </header>

  <div class="signin-card" id="signin-card">
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-pass" placeholder="Password" onkeydown="if(event.key==='Enter') adminSignIn()">
    <button class="btn-primary" onclick="adminSignIn()">Sign In</button>
    <div class="auth-error" id="auth-error"></div>
  </div>

  <div id="main" style="display:none">
    <div class="filters">
      <button id="btn-all" class="active" onclick="setFilter('all')">All</button>
      <button id="btn-shared" onclick="setFilter('shared')">Shared Only</button>
      <select id="sel-mode" onchange="reload()">
        <option value="">All Modes</option>
        <option value="own">Own VOD</option>
        <option value="pro">Pro VOD</option>
        <option value="followup">Follow-up</option>
      </select>
      <select id="sel-agent" onchange="reload()">
        <option value="">All Agents</option>
        <optgroup label="Duelists">
          <option value="jett">Jett</option><option value="reyna">Reyna</option><option value="raze">Raze</option>
          <option value="neon">Neon</option><option value="phoenix">Phoenix</option><option value="yoru">Yoru</option>
          <option value="iso">Iso</option><option value="waylay">Waylay</option>
        </optgroup>
        <optgroup label="Controllers">
          <option value="omen">Omen</option><option value="viper">Viper</option><option value="brimstone">Brimstone</option>
          <option value="astra">Astra</option><option value="harbor">Harbor</option><option value="clove">Clove</option>
          <option value="miks">Miks</option>
        </optgroup>
        <optgroup label="Sentinels">
          <option value="sage">Sage</option><option value="cypher">Cypher</option><option value="killjoy">Killjoy</option>
          <option value="chamber">Chamber</option><option value="deadlock">Deadlock</option><option value="vyse">Vyse</option>
          <option value="veto">Veto</option>
        </optgroup>
        <optgroup label="Initiators">
          <option value="sova">Sova</option><option value="breach">Breach</option><option value="skye">Skye</option>
          <option value="kayo">KAY/O</option><option value="fade">Fade</option><option value="gekko">Gekko</option>
          <option value="tejo">Tejo</option>
        </optgroup>
      </select>
      <div class="stat" id="stat"></div>
    </div>

    <div id="entries-list"></div>
    <button class="load-more" id="load-more-btn" onclick="loadMore()" style="display:none">Load more</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://cvdtykmkajmhlxydhzzl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_I16eAnYgsA9fd8ZMlmFQtA_RxepSaXi';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentFilter = 'all';
let currentOffset = 0;
let totalCount = 0;
let allEntries = [];

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  const status = document.getElementById('auth-status');
  if (session) {
    status.textContent = `✓ ${session.user.email}`;
    status.style.color = '#6BCF6B';
    document.getElementById('main').style.display = 'block';
    loadEntries(true);
  } else {
    status.textContent = 'Not signed in';
    status.style.color = '#FF4655';
    document.getElementById('signin-card').style.display = 'block';
  }
})();

async function adminSignIn() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = error.message; return; }
  document.getElementById('auth-status').textContent = `✓ ${data.user.email}`;
  document.getElementById('auth-status').style.color = '#6BCF6B';
  document.getElementById('signin-card').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  loadEntries(true);
}

async function getToken() {
  const { data: { session } } = await sb.auth.getSession();
  return session?.access_token || null;
}

function setFilter(f) {
  currentFilter = f;
  document.getElementById('btn-all').classList.toggle('active', f === 'all');
  document.getElementById('btn-shared').classList.toggle('active', f === 'shared');
  reload();
}

function reload() {
  currentOffset = 0;
  allEntries = [];
  loadEntries(true);
}

async function loadEntries(reset) {
  const token = await getToken();
  if (!token) return;

  const agent = document.getElementById('sel-agent').value;
  const mode = document.getElementById('sel-mode').value;
  const params = new URLSearchParams({ filter: currentFilter, offset: currentOffset, agent, mode });

  const res = await fetch(`/api/admin-coaching?${params}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  if (!res.ok) return;

  const { data, count } = await res.json();
  totalCount = count || 0;

  if (reset) allEntries = data || [];
  else allEntries = [...allEntries, ...(data || [])];

  render();
  document.getElementById('stat').textContent = `${totalCount} entries`;

  const loadBtn = document.getElementById('load-more-btn');
  loadBtn.style.display = allEntries.length < totalCount ? 'block' : 'none';
  loadBtn.disabled = false;
}

async function loadMore() {
  document.getElementById('load-more-btn').disabled = true;
  currentOffset += 25;
  await loadEntries(false);
}

function fmt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function render() {
  const list = document.getElementById('entries-list');
  if (!allEntries.length) {
    list.innerHTML = '<div class="empty">No entries found.</div>';
    return;
  }

  list.innerHTML = allEntries.map((e, i) => {
    const notesCollapsed = (e.notes || '').length > 200;
    const outputCollapsed = (e.coaching_output || '').length > 300;
    return `
    <div class="entry">
      <div class="entry-meta">
        <span class="tag tag-mode">${e.mode || '—'}</span>
        ${e.agent ? `<span class="tag tag-agent">${e.agent}</span>` : ''}
        ${e.map ? `<span class="tag tag-map">${e.map}</span>` : ''}
        ${e.share_coaching ? '<span class="tag tag-shared">shared</span>' : '<span class="tag tag-private">private</span>'}
        <span class="entry-date">${fmt(e.created_at)}</span>
      </div>
      ${e.notes ? `
      <div class="entry-section">
        <div class="entry-label">Notes</div>
        <div class="entry-body${notesCollapsed ? ' collapsed' : ''}" id="notes-${i}">${esc(e.notes)}</div>
        ${notesCollapsed ? `<button class="expand-btn" onclick="expand('notes-${i}', this)">Show more</button>` : ''}
      </div>` : ''}
      ${e.coaching_output ? `
      <div class="entry-section">
        <div class="entry-label">Coaching Output</div>
        <div class="entry-body${outputCollapsed ? ' collapsed' : ''}" id="output-${i}">${esc(e.coaching_output)}</div>
        ${outputCollapsed ? `<button class="expand-btn" onclick="expand('output-${i}', this)">Show more</button>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

function expand(id, btn) {
  document.getElementById(id).classList.remove('collapsed');
  btn.remove();
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
