<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fraglog.gg — Lineup Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" async defer></script>
<style>
:root {
  --red: #FF4655;
  --darker: #080E14;
  --surface: #151E27;
  --surface2: #1C2733;
  --border: rgba(255,255,255,0.08);
  --text: #ECE8E1;
  --muted: #7B8FA1;
  --green: #6BCF6B;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--darker); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* Header */
header {
  display: flex; align-items: center; gap: 12px;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(8,14,20,0.95);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; }
.logo span { color: var(--red); }
.badge {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  background: rgba(255,70,85,0.15); color: var(--red);
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid rgba(255,70,85,0.3);
}
.header-status { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
.header-status.connected { color: var(--green); }

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  min-height: calc(100vh - 57px);
}

/* Left — minimap */
.map-panel {
  padding: 2rem;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.map-select-row {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}

.minimap-wrap {
  position: relative;
  width: 100%;
  height: calc(100vh - 160px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: crosshair;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
.minimap-wrap.placing-stand { cursor: crosshair; border-color: rgba(100,200,255,0.5); }
.minimap-wrap.placing-land { cursor: crosshair; border-color: rgba(255,120,0,0.5); }

#minimap-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  pointer-events: none;
}

#minimap-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

.minimap-placeholder {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  color: var(--muted); padding: 3rem;
}
.minimap-placeholder-icon { font-size: 40px; opacity: 0.3; }
.minimap-placeholder-text { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; }

/* Marker mode buttons */
.marker-modes {
  display: flex; gap: 8px;
}
.mode-btn {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 8px 14px; border-radius: 8px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); transition: all 0.15s; display: flex;
  align-items: center; gap: 6px;
}
.mode-btn:hover { color: var(--text); }
.mode-btn.active-stand { background: rgba(100,200,255,0.15); border-color: rgba(100,200,255,0.5); color: #64C8FF; }
.mode-btn.active-land { background: rgba(255,120,0,0.15); border-color: rgba(255,120,0,0.5); color: #FF7800; }
.mode-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.coords-display {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); display: flex; gap: 1.5rem; flex-wrap: wrap;
}
.coord-item { display: flex; gap: 6px; align-items: center; }
.coord-label { color: var(--muted); }
.coord-val { color: var(--text); }
.coord-val.set { color: var(--green); }

/* Right — form */
.form-panel {
  padding: 2rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.form-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 2px;
}

.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}
.field input, .field select, .field textarea {
  background: var(--darker); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; padding: 9px 12px; border-radius: 8px;
  outline: none; transition: border-color 0.15s; width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: rgba(255,70,85,0.5);
}
.field select option { background: var(--surface); }
.field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
.field-hint { font-size: 11px; color: var(--muted); }

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* YouTube preview */
.yt-preview { display: none; margin-top: 8px; }
.yt-preview img { width: 100%; border-radius: 6px; border: 1px solid var(--border); }
.yt-preview.visible { display: block; }
.yt-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--red); margin-top: 4px; }

/* Throw type */
.throw-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.throw-btn {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 8px 6px; border-radius: 6px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); transition: all 0.15s; text-align: center;
}
.throw-btn:hover { color: var(--text); }
.throw-btn.active { background: rgba(255,70,85,0.15); border-color: var(--red); color: var(--red); }

/* Tags */
.tags-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.tag {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.tag.active { background: rgba(255,70,85,0.15); border-color: rgba(255,70,85,0.4); color: var(--red); }

/* Submit */
.submit-btn {
  font-family: 'DM Mono', monospace; font-size: 12px;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 14px; background: var(--red); color: #fff;
  border: none; border-radius: 8px; cursor: pointer;
  transition: background 0.15s; width: 100%; margin-top: 0.5rem;
}
.submit-btn:hover { background: #e03040; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.submit-status {
  font-family: 'DM Mono', monospace; font-size: 11px;
  text-align: center; min-height: 16px;
}

/* Recent lineups */
.recent-section { margin-top: 1rem; }
.recent-title {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.recent-list { display: flex; flex-direction: column; gap: 6px; }
.recent-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.recent-item-info { flex: 1; }
.recent-item-name {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text); text-transform: capitalize;
}
.recent-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.recent-delete {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--red); cursor: pointer; opacity: 0.6;
  background: none; border: none; padding: 2px 6px;
  transition: opacity 0.15s;
}
.recent-delete:hover { opacity: 1; }

/* Ability picker */
.ability-picker {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.ability-btn {
  width: 48px; height: 48px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); cursor: pointer;
  overflow: hidden; padding: 0; transition: all 0.15s;
  position: relative;
}
.ability-btn:hover { border-color: rgba(255,70,85,0.4); transform: scale(1.05); }
.ability-btn.active { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,70,85,0.3); }
.ability-btn img { width: 100%; height: 100%; object-fit: contain; padding: 6px; filter: brightness(0.8); }
.ability-btn.active img { filter: brightness(1); }
.ability-slot-label {
  position: absolute; bottom: 2px; right: 3px;
  font-family: 'DM Mono', monospace; font-size: 8px;
  color: var(--muted); line-height: 1;
}

/* Agent grid in form */
.agent-form-grid {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
}
.agent-form-btn {
  aspect-ratio: 1; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); cursor: pointer; overflow: hidden;
  padding: 0; transition: all 0.15s;
}
.agent-form-btn:hover { border-color: rgba(255,70,85,0.4); transform: scale(1.1); }
.agent-form-btn.active { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,70,85,0.3); }
.agent-form-btn img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">fraglog<span>.</span>gg</div>
  <div class="badge">Lineup Admin</div>
  <div class="header-status" id="header-status">Connecting...</div>
</header>

<div class="layout">

  <!-- Left: minimap -->
  <div class="map-panel">
    <div class="map-select-row">
      <select id="sel-map" onchange="loadMap()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:8px 12px;border-radius:8px;outline:none;letter-spacing:1px;text-transform:uppercase">
        <option value="">Select map...</option>
        <option value="ascent">Ascent</option>
        <option value="bind">Bind</option>
        <option value="haven">Haven</option>
        <option value="split">Split</option>
        <option value="fracture">Fracture</option>
        <option value="pearl">Pearl</option>
        <option value="icebox">Icebox</option>
        <option value="breeze">Breeze</option>
        <option value="lotus">Lotus</option>
        <option value="sunset">Sunset</option>
        <option value="abyss">Abyss</option>
        <option value="corrode">Corrode</option>
      </select>
      <button class="mode-btn active-stand" id="side-attack" onclick="setSide('attack')">Attack</button>
      <button class="mode-btn" id="side-defense" onclick="setSide('defense')">Defense</button>
    </div>

    <div class="marker-modes">
      <button class="mode-btn active-stand" id="mode-stand" onclick="setMode('stand')">
        <div class="dot" style="background:#64C8FF"></div>
        Stand Position
      </button>
      <button class="mode-btn" id="mode-land" onclick="setMode('land')">
        <div class="dot" style="background:#FF7800"></div>
        Landing Spot
      </button>
      <button class="mode-btn" id="mode-wall-end" onclick="setMode('wall-end')" style="display:none">
        <div class="dot" style="background:#A855F7"></div>
        Wall End
      </button>
    </div>

    <div class="minimap-wrap" id="minimap-wrap" 
      onmousedown="handleMapMouseDown(event)"
      onmousemove="handleMapMouseMove(event)"
      onmouseup="handleMapMouseUp(event)"
      onmouseleave="handleMapMouseUp(event)">
      <div class="minimap-placeholder" id="minimap-placeholder">
        <div class="minimap-placeholder-icon">🗺</div>
        <div class="minimap-placeholder-text">Select a map to begin</div>
      </div>
      <img id="minimap-img" src="" alt="" style="display:none">
      <canvas id="minimap-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></canvas>
    </div>

    <div class="coords-display">
      <div class="coord-item">
        <div class="dot" style="width:8px;height:8px;border-radius:50%;background:#64C8FF;flex-shrink:0"></div>
        <span class="coord-label">Stand:</span>
        <span class="coord-val" id="stand-coords">not set</span>
      </div>
      <div class="coord-item">
        <div class="dot" style="width:8px;height:8px;border-radius:50%;background:#FF7800;flex-shrink:0"></div>
        <span class="coord-label">Land:</span>
        <span class="coord-val" id="land-coords">not set</span>
      </div>
      <div class="coord-item" id="wall-end-coord-item" style="display:none">
        <div class="dot" style="width:8px;height:8px;border-radius:50%;background:#A855F7;flex-shrink:0"></div>
        <span class="coord-label">Wall End:</span>
        <span class="coord-val" id="wall-end-coords">not set</span>
      </div>
      <button onclick="clearMarkers()" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;margin-left:auto">Clear</button>
    </div>
  </div>

  <!-- Right: form -->
  <div class="form-panel">
    <div class="form-title">Add Lineup</div>

    <!-- Agent -->
    <div class="field">
      <label>Agent</label>
      <div class="agent-form-grid" id="agent-grid"></div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--red);margin-top:5px;min-height:14px" id="selected-agent-name"></div>
    </div>

    <!-- Ability picker -->
    <div class="field" id="ability-picker-field" style="display:none">
      <label>Ability</label>
      <div class="ability-picker" id="ability-picker"></div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--red);margin-top:5px;min-height:14px" id="selected-ability-name"></div>
    </div>

    <!-- YouTube -->
    <div class="field">
      <label>YouTube URL or ID</label>
      <input type="text" id="inp-yt" placeholder="https://youtube.com/watch?v=..." oninput="handleYT()">
      <div class="yt-preview" id="yt-preview">
        <img id="yt-thumb" src="" alt="">
        <div class="yt-id" id="yt-id"></div>
      </div>
    </div>

    <!-- Title -->
    <div class="field">
      <label>Title</label>
      <input type="text" id="inp-title" placeholder="e.g. Viper B site default smoke from spawn">
    </div>

    <!-- Description -->
    <div class="field">
      <label>Description</label>
      <textarea id="inp-desc" placeholder="e.g. Viper wall covering A main and CT from attacker spawn on Bind"></textarea>
    </div>

    <!-- Tags -->
    <div class="field">
      <label>Tags</label>
      <div class="tags-wrap" id="tags-wrap">
        <div class="tag" data-tag="A site" onclick="toggleTag(this)">A site</div>
        <div class="tag" data-tag="B site" onclick="toggleTag(this)">B site</div>
        <div class="tag" data-tag="C site" onclick="toggleTag(this)">C site</div>
        <div class="tag" data-tag="mid" onclick="toggleTag(this)">Mid</div>
        <div class="tag" data-tag="attack" onclick="toggleTag(this)">Attack</div>
        <div class="tag" data-tag="defense" onclick="toggleTag(this)">Defense</div>
        <div class="tag" data-tag="default" onclick="toggleTag(this)">Default</div>
        <div class="tag" data-tag="post-plant" onclick="toggleTag(this)">Post-plant</div>
        <div class="tag" data-tag="retake" onclick="toggleTag(this)">Retake</div>
        <div class="tag" data-tag="eco" onclick="toggleTag(this)">Eco</div>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitLineup()">Save Lineup</button>
    <button id="cancel-edit-btn" onclick="cancelEdit()" style="display:none;width:100%;margin-top:8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:9px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer">Cancel edit</button>
    <div class="submit-status" id="submit-status"></div>

    <!-- Recent lineups -->
    <div class="recent-section">
      <div class="recent-title">Recent Lineups (<span id="recent-count">0</span>)</div>
      <div class="recent-list" id="recent-list"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://cvdtykmkajmhlxydhzzl.supabase.co";
const SUPABASE_KEY = "sb_publishable_I16eAnYgsA9fd8ZMlmFQtA_RxepSaXi";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const AGENTS = [
  "jett","reyna","raze","neon","phoenix","yoru","iso","waylay",
  "omen","viper","brimstone","astra","harbor","clove","miks",
  "sage","cypher","killjoy","chamber","deadlock","vyse","veto",
  "sova","breach","skye","kayo","fade","gekko","tejo"
];

let mode = 'stand';
let standPos = null;
let landPos = null;
let wallEndPos = null;
let selectedAgent = null;
let selectedThrow = 'stand';
let ytId = null;
let selectedSide = 'attack';
let isWallUtil = false;
let editingId = null;
let recentLineups = [];

// Init
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  const status = document.getElementById('header-status');
  if (session) {
    status.textContent = `✓ ${session.user.email}`;
    status.classList.add('connected');
  } else {
    status.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;gap:8px;align-items:center">
          <input type="email" id="admin-email" placeholder="email" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:6px;outline:none;width:180px">
          <input type="password" id="admin-pass" placeholder="password" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:6px;outline:none;width:130px">
          <button onclick="adminSignIn()" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer">Sign In</button>
        </div>
        <div id="turnstile-widget"></div>
        <div id="signin-error" style="font-family:'DM Mono',monospace;font-size:11px;color:#FF4655;min-height:14px"></div>
      </div>`;
  }
  buildAgentGrid();
  loadRecent();
})();

function onTurnstileLoad() {}

function getTurnstileToken() {
  return new Promise((resolve, reject) => {
    const el = document.getElementById('turnstile-widget');
    el.innerHTML = '';
    turnstile.render(el, {
      sitekey: '0x4AAAAAADfLzeMlyfoAvDRy',
      theme: 'dark',
      callback: resolve,
      'error-callback': (code) => reject(new Error(`CAPTCHA error: ${code}`)),
    });
  });
}

async function adminSignIn() {
  const email = document.getElementById('admin-email').value;
  const pass = document.getElementById('admin-pass').value;
  const errEl = document.getElementById('signin-error');
  if (errEl) errEl.textContent = 'Verifying…';
  let captchaToken;
  try { captchaToken = await getTurnstileToken(); }
  catch (e) { if (errEl) errEl.textContent = e.message; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass, options: { captchaToken } });
  if (error) { if (errEl) errEl.textContent = error.message; return; }
  const status = document.getElementById('header-status');
  status.textContent = `✓ ${data.user.email}`;
  status.className = 'header-status connected';
}

function buildAgentGrid() {
  const grid = document.getElementById('agent-grid');
  grid.innerHTML = AGENTS.map(a => `
    <button class="agent-form-btn" data-agent="${a}" onclick="selectAgent('${a}')" title="${a.charAt(0).toUpperCase()+a.slice(1)}">
      <img src="/agents/busts/${a}.png" alt="${a}">
    </button>
  `).join('');
}

let selectedAbility = null; // { slot, name }

function selectAgent(id) {
  selectedAgent = id;
  selectedAbility = null;
  document.querySelectorAll('.agent-form-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-agent="${id}"]`)?.classList.add('active');
  document.getElementById('selected-agent-name').textContent = id.charAt(0).toUpperCase() + id.slice(1);
  updateAbilityPicker();
}

// Util type per agent ability slot
const AGENT_UTIL_TYPES = {
  jett:      { ability1:'smoke', ability2:'other', grenade:'other', ultimate:'other' },
  reyna:     { ability1:'other', ability2:'other', grenade:'other', ultimate:'other' },
  raze:      { ability1:'molly', ability2:'other', grenade:'molly', ultimate:'other' },
  neon:      { ability1:'other', ability2:'wall', grenade:'other', ultimate:'other' },
  phoenix:   { ability1:'wall', ability2:'flash', grenade:'molly', ultimate:'other' },
  yoru:      { ability1:'flash', ability2:'other', grenade:'other', ultimate:'other' },
  iso:       { ability1:'other', ability2:'other', grenade:'other', ultimate:'other' },
  waylay:    { ability1:'other', ability2:'other', grenade:'other', ultimate:'other' },
  omen:      { ability1:'smoke', ability2:'smoke', grenade:'other', ultimate:'other' },
  viper:     { ability1:'molly', ability2:'wall', grenade:'smoke', ultimate:'smoke' },
  brimstone: { ability1:'molly', ability2:'smoke', grenade:'smoke', ultimate:'molly' },
  astra:     { ability1:'smoke', ability2:'other', grenade:'other', ultimate:'wall' },
  harbor:    { ability1:'wall', ability2:'smoke', grenade:'smoke', ultimate:'wall' },
  clove:     { ability1:'smoke', ability2:'other', grenade:'molly', ultimate:'other' },
  miks:      { ability1:'smoke', ability2:'smoke', grenade:'other', ultimate:'other' },
  sage:      { ability1:'wall', ability2:'other', grenade:'molly', ultimate:'other' },
  cypher:    { ability1:'other', ability2:'other', grenade:'dart', ultimate:'other' },
  killjoy:   { ability1:'molly', ability2:'other', grenade:'other', ultimate:'wall' },
  chamber:   { ability1:'other', ability2:'other', grenade:'other', ultimate:'other' },
  deadlock:  { ability1:'other', ability2:'other', grenade:'wall', ultimate:'other' },
  vyse:      { ability1:'other', ability2:'wall', grenade:'other', ultimate:'other' },
  veto:      { ability1:'other', ability2:'other', grenade:'other', ultimate:'other' },
  sova:      { ability1:'dart', ability2:'other', grenade:'dart', ultimate:'dart' },
  breach:    { ability1:'flash', ability2:'molly', grenade:'flash', ultimate:'other' },
  skye:      { ability1:'other', ability2:'flash', grenade:'dart', ultimate:'other' },
  kayo:      { ability1:'flash', ability2:'dart', grenade:'molly', ultimate:'other' },
  fade:      { ability1:'dart', ability2:'other', grenade:'dart', ultimate:'other' },
  gekko:     { ability1:'flash', ability2:'other', grenade:'molly', ultimate:'other' },
  tejo:      { ability1:'dart', ability2:'molly', grenade:'other', ultimate:'other' },
};

function updateAbilityPicker() {
  const field = document.getElementById('ability-picker-field');
  const picker = document.getElementById('ability-picker');

  if (!selectedAgent) { field.style.display = 'none'; return; }

  field.style.display = 'flex';
  const slots = ['ability1', 'ability2', 'grenade', 'ultimate'];
  const slotLabels = { ability1: '', ability2: '', grenade: '', ultimate: '' };

  picker.innerHTML = slots.map(slot => `
    <button class="ability-btn ${selectedAbility?.slot === slot ? 'active' : ''}"
      data-slot="${slot}"
      onclick="selectAbility('${slot}')"
      >
      <img src="/abilities/${selectedAgent}/${slot}.png" alt="${slot}"
        onerror="this.style.display='none'">
    </button>
  `).join('');
}

function selectAbility(slot) {
  selectedAbility = { slot };
  document.querySelectorAll('.ability-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-slot="${slot}"]`)?.classList.add('active');
  const labels = { ability1: 'C', ability2: 'Q', grenade: 'E', ultimate: 'X' };
  document.getElementById('selected-ability-name').textContent = `Slot ${labels[slot]}`;
  updateWallMode();
  renderMarkers();
}

function selectThrow(t) {
  selectedThrow = t;
  document.querySelectorAll('.throw-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-throw="${t}"]`)?.classList.add('active');
}

function toggleTag(el) { el.classList.toggle('active'); }

function setSide(side) {
  selectedSide = side;
  document.getElementById('side-attack').className = 'mode-btn' + (side === 'attack' ? ' active-stand' : '');
  document.getElementById('side-defense').className = 'mode-btn' + (side === 'defense' ? ' active-land' : '');
  const map = document.getElementById('sel-map').value;
  if (map) loadMap();
}

function setMode(m) {
  mode = m;
  const wrap = document.getElementById('minimap-wrap');
  wrap.className = 'minimap-wrap placing-' + (m === 'wall-end' ? 'land' : m);
  document.getElementById('mode-stand').className = 'mode-btn' + (m === 'stand' ? ' active-stand' : '');
  document.getElementById('mode-land').className = 'mode-btn' + (m === 'land' ? ' active-land' : '');
  const wallBtn = document.getElementById('mode-wall-end');
  if (wallBtn) wallBtn.className = 'mode-btn' + (m === 'wall-end' ? ' active-land' : '') + (isWallUtil ? '' : ' ');
}

function updateWallMode() {
  const utilType = AGENT_UTIL_TYPES[selectedAgent]?.[selectedAbility?.slot];
  isWallUtil = utilType === 'wall';
  const wallBtn = document.getElementById('mode-wall-end');
  const wallCoord = document.getElementById('wall-end-coord-item');
  if (wallBtn) wallBtn.style.display = isWallUtil ? 'flex' : 'none';
  if (wallCoord) wallCoord.style.display = isWallUtil ? 'flex' : 'none';
  if (!isWallUtil) wallEndPos = null;
}

const MAP_ROTATION = {
  ascent:   0,
  bind:     0,
  haven:    0,
  split:    0,
  fracture: 90,
  pearl:    0,
  icebox:   90,
  breeze:   0,
  lotus:    0,
  sunset:   0,
  abyss:    0,
  corrode:  0,
};

function loadMap() {
  const map = document.getElementById('sel-map').value;
  const img = document.getElementById('minimap-img');
  const placeholder = document.getElementById('minimap-placeholder');
  if (!map) {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
    return;
  }
  img.src = `/maps/${map}-${selectedSide}.png`;
  img.style.transform = '';
  img.style.display = 'block';
  placeholder.style.display = 'none';
  clearMarkers();
}

let dragging = null; // 'stand' or 'land'

function getPosOnMap(clientX, clientY) {
  const img = document.getElementById('minimap-img');
  const imgRect = img.getBoundingClientRect();
  const x = (clientX - imgRect.left) / imgRect.width;
  const y = (clientY - imgRect.top) / imgRect.height;
  if (x < 0 || x > 1 || y < 0 || y > 1) return null;
  return { x: Math.round(x * 1000) / 1000, y: Math.round(y * 1000) / 1000 };
}

function getMarkerAt(clientX, clientY) {
  const img = document.getElementById('minimap-img');
  const imgRect = img.getBoundingClientRect();
  const ox = imgRect.left;
  const oy = imgRect.top;
  const sw = imgRect.width;
  const sh = imgRect.height;
  const hitSize = 20;

  if (standPos) {
    const mx = ox + standPos.x * sw;
    const my = oy + standPos.y * sh;
    if (Math.abs(clientX - mx) < hitSize && Math.abs(clientY - my) < hitSize) return 'stand';
  }
  if (landPos) {
    const mx = ox + landPos.x * sw;
    const my = oy + landPos.y * sh;
    if (Math.abs(clientX - mx) < hitSize && Math.abs(clientY - my) < hitSize) return 'land';
  }
  if (wallEndPos) {
    const mx = ox + wallEndPos.x * sw;
    const my = oy + wallEndPos.y * sh;
    if (Math.abs(clientX - mx) < hitSize && Math.abs(clientY - my) < hitSize) return 'wall-end';
  }
  return null;
}

function updateCoords(which, pos) {
  document.getElementById(`${which}-coords`).textContent = `${pos.x}, ${pos.y}`;
  document.getElementById(`${which}-coords`).classList.add('set');
}

function handleMapMouseDown(e) {
  const map = document.getElementById('sel-map').value;
  if (!map) return;
  const img = document.getElementById('minimap-img');
  if (img.style.display === 'none') return;

  // Check if clicking on existing marker
  const hit = getMarkerAt(e.clientX, e.clientY);
  if (hit) {
    dragging = hit;
    document.getElementById('minimap-wrap').style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }

  // Otherwise place new marker
  const pos = getPosOnMap(e.clientX, e.clientY);
  if (!pos) return;

  if (mode === 'stand') {
    standPos = pos;
    updateCoords('stand', pos);
    setMode('land');
  } else if (mode === 'wall-end') {
    wallEndPos = pos;
    document.getElementById('wall-end-coords').textContent = `${pos.x}, ${pos.y}`;
    document.getElementById('wall-end-coords').classList.add('set');
  } else {
    landPos = pos;
    updateCoords('land', pos);
    if (isWallUtil) setMode('wall-end');
  }
  renderMarkers();
}

function handleMapMouseMove(e) {
  if (!dragging) return;
  const pos = getPosOnMap(e.clientX, e.clientY);
  if (!pos) return;

  if (dragging === 'stand') {
    standPos = pos;
    updateCoords('stand', pos);
  } else if (dragging === 'wall-end') {
    wallEndPos = pos;
    document.getElementById('wall-end-coords').textContent = `${pos.x}, ${pos.y}`;
    document.getElementById('wall-end-coords').classList.add('set');
  } else {
    landPos = pos;
    updateCoords('land', pos);
  }
  renderMarkers();
}

function handleMapMouseUp(e) {
  if (dragging) {
    dragging = null;
    document.getElementById('minimap-wrap').style.cursor = 'crosshair';
  }
}

function handleMapClick(e) {
  // handled by mousedown now
}

function renderMarkers() {
  const canvas = document.getElementById('minimap-canvas');
  const img = document.getElementById('minimap-img');
  const wrap = document.getElementById('minimap-wrap');

  const imgRect = img.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();

  // Set canvas to actual pixel size
  canvas.width = wrapRect.width;
  canvas.height = wrapRect.height;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const ox = imgRect.left - wrapRect.left;
  const oy = imgRect.top - wrapRect.top;
  const sw = imgRect.width;
  const sh = imgRect.height;

  function toX(x) { return ox + x * sw; }
  function toY(y) { return oy + y * sh; }

  const GREEN = '#43E07A';

  // matches the /util page marker style (drawMarkers)
  function line(x1, y1, x2, y2, color, w) {
    ctx.save(); ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = w + 3;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.strokeStyle = color; ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.restore();
  }

  function disc(x, y, r, src, bg, pad) {
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = bg || '#0e131c';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 2;
    ctx.fill(); ctx.restore();
    const image = new Image();
    image.onload = () => {
      ctx.save();
      ctx.beginPath(); ctx.arc(x, y, r - 1, 0, Math.PI * 2); ctx.clip();
      const d = (r - 1 - (pad || 0)) * 2;
      ctx.drawImage(image, x - d / 2, y - d / 2, d, d);
      ctx.restore();
    };
    image.src = src;
  }

  // throw line: stand -> land
  if (standPos && landPos)
    line(toX(standPos.x), toY(standPos.y), toX(landPos.x), toY(landPos.y), 'rgba(255,255,255,0.9)', 2.6);

  // wall line: land -> wallEnd (green)
  if (isWallUtil && landPos && wallEndPos)
    line(toX(landPos.x), toY(landPos.y), toX(wallEndPos.x), toY(wallEndPos.y), GREEN, 5);

  // ability icon at the landing spot (skipped for walls — the wall line is the util)
  if (landPos && selectedAgent && selectedAbility && !isWallUtil)
    disc(toX(landPos.x), toY(landPos.y), 15, `/abilities/${selectedAgent}/${selectedAbility.slot}.png`, '#15171f', 3);

  // agent portrait at the stand spot — drawn last, on top
  if (standPos && selectedAgent)
    disc(toX(standPos.x), toY(standPos.y), 19, `/agents/busts/${selectedAgent}.png`);
}
function clearMarkers() {
  standPos = null; landPos = null; wallEndPos = null;
  document.getElementById('stand-coords').textContent = 'not set';
  document.getElementById('stand-coords').classList.remove('set');
  document.getElementById('land-coords').textContent = 'not set';
  document.getElementById('land-coords').classList.remove('set');
  document.getElementById('wall-end-coords').textContent = 'not set';
  document.getElementById('wall-end-coords').classList.remove('set');
  const c = document.getElementById('minimap-canvas'); c.getContext('2d').clearRect(0,0,c.width,c.height);
  setMode('stand');
}

function handleYT() {
  const val = document.getElementById('inp-yt').value.trim();
  const match = val.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  const preview = document.getElementById('yt-preview');
  const idEl = document.getElementById('yt-id');

  if (match) {
    ytId = match[1];
    document.getElementById('yt-thumb').src = `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
    idEl.textContent = `ID: ${ytId}`;
    preview.classList.add('visible');
  } else if (val.length === 11 && /^[a-zA-Z0-9_-]+$/.test(val)) {
    ytId = val;
    document.getElementById('yt-thumb').src = `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
    idEl.textContent = `ID: ${ytId}`;
    preview.classList.add('visible');
  } else {
    ytId = null;
    preview.classList.remove('visible');
  }
}

function setStatus(msg, color = 'var(--green)') {
  const el = document.getElementById('submit-status');
  el.textContent = msg;
  el.style.color = color;
  setTimeout(() => el.textContent = '', 4000);
}

async function submitLineup() {
  const map = document.getElementById('sel-map').value;
  const util = selectedAbility ? (AGENT_UTIL_TYPES[selectedAgent]?.[selectedAbility.slot] || 'other') : null;
  const desc = document.getElementById('inp-desc').value.trim();
  const title = document.getElementById('inp-title').value.trim();

  if (!map) { setStatus('Select a map.', 'var(--red)'); return; }
  if (!selectedAgent) { setStatus('Select an agent.', 'var(--red)'); return; }
  if (!util) { setStatus('Select an ability.', 'var(--red)'); return; }
  if (!standPos) { setStatus('Click the minimap to set stand position.', 'var(--red)'); return; }
  if (!landPos) { setStatus('Click the minimap to set landing spot.', 'var(--red)'); return; }
  if (!ytId) { setStatus('Paste a YouTube URL.', 'var(--red)'); return; }
  if (!title) { setStatus('Add a title.', 'var(--red)'); return; }
  if (!desc) { setStatus('Add a description.', 'var(--red)'); return; }

  const tags = [...document.querySelectorAll('.tag.active')].map(t => t.dataset.tag);

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Saving...';

  const payload = {
    map,
    agent: selectedAgent,
    util_type: util,
    throw_type: selectedThrow,
    side: selectedSide,
    stand_x: standPos.x,
    stand_y: standPos.y,
    land_x: landPos.x,
    land_y: landPos.y,
    wall_end_x: isWallUtil ? wallEndPos?.x || null : null,
    wall_end_y: isWallUtil ? wallEndPos?.y || null : null,
    youtube_id: ytId,
    description: desc,
    title,
    tags,
    ability_slot: selectedAbility?.slot || null
  };

  const { error } = editingId
    ? await sb.from('lineups').update(payload).eq('id', editingId)
    : await sb.from('lineups').insert(payload);

  btn.disabled = false;
  btn.textContent = editingId ? 'Update Lineup' : 'Save Lineup';

  if (error) { setStatus('Error: ' + error.message, 'var(--red)'); return; }

  setStatus(editingId ? '✓ Lineup updated!' : '✓ Lineup saved!');
  editingId = null;
  document.getElementById('submit-btn').textContent = 'Save Lineup';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  clearMarkers();
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-yt').value = '';
  document.getElementById('yt-preview').classList.remove('visible');
  document.querySelectorAll('.tag.active').forEach(t => t.classList.remove('active'));
  ytId = null;
  loadRecent();
}

async function loadRecent() {
  const { data } = await sb.from('lineups').select('*').order('created_at', { ascending: false }).limit(200);
  recentLineups = data || [];
  const list = document.getElementById('recent-list');
  const count = document.getElementById('recent-count');
  if (!data || !data.length) {
    list.innerHTML = '<div style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted);padding:1rem 0">No lineups yet</div>';
    count.textContent = 0;
    return;
  }
  count.textContent = data.length;
  list.innerHTML = data.map(l => `
    <div class="recent-item" style="${editingId === l.id ? 'outline:1px solid var(--red);outline-offset:-1px' : ''}">
      <img src="/agents/${l.agent}.png" style="width:32px;height:32px;border-radius:50%;object-fit:cover;object-position:top;border:1px solid var(--border)">
      <div class="recent-item-info">
        <div class="recent-item-name">${l.agent} · ${l.map} · ${l.util_type}</div>
        <div class="recent-item-meta">${(l.description || '').substring(0, 60)}${(l.description || '').length > 60 ? '...' : ''}</div>
      </div>
      <button class="recent-edit" onclick="editLineup('${l.id}')" style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;flex-shrink:0">Edit</button>
      <button class="recent-delete" onclick="deleteLineup('${l.id}')">✕</button>
    </div>
  `).join('');
}

async function deleteLineup(id) {
  if (!confirm('Delete this lineup?')) return;
  await sb.from('lineups').delete().eq('id', id);
  if (editingId === id) cancelEdit();
  loadRecent();
}

function editLineup(id) {
  const l = recentLineups.find(x => String(x.id) === String(id));
  if (!l) return;
  editingId = l.id;
  selectedSide = l.side || 'attack';
  document.getElementById('side-attack').className = 'mode-btn' + (selectedSide === 'attack' ? ' active-stand' : '');
  document.getElementById('side-defense').className = 'mode-btn' + (selectedSide === 'defense' ? ' active-land' : '');
  document.getElementById('sel-map').value = l.map;
  selectAgent(l.agent);
  if (l.ability_slot) selectAbility(l.ability_slot);
  if (l.throw_type) selectThrow(l.throw_type);

  // load the map image, then drop the saved markers onto it
  const img = document.getElementById('minimap-img');
  document.getElementById('minimap-placeholder').style.display = 'none';
  img.style.display = 'block';
  const place = () => {
    standPos = l.stand_x != null ? { x: l.stand_x, y: l.stand_y } : null;
    landPos = l.land_x != null ? { x: l.land_x, y: l.land_y } : null;
    wallEndPos = l.wall_end_x != null ? { x: l.wall_end_x, y: l.wall_end_y } : null;
    if (standPos) updateCoords('stand', standPos);
    if (landPos) updateCoords('land', landPos);
    if (wallEndPos) { const w = document.getElementById('wall-end-coords'); w.textContent = `${wallEndPos.x}, ${wallEndPos.y}`; w.classList.add('set'); }
    renderMarkers();
  };
  img.onload = place;
  img.src = `/maps/${l.map}-${selectedSide}.png`;
  setTimeout(place, 250);

  document.getElementById('inp-title').value = l.title || '';
  document.getElementById('inp-desc').value = l.description || '';
  document.getElementById('inp-yt').value = l.youtube_id || '';
  handleYT();
  document.querySelectorAll('.tag').forEach(t => t.classList.toggle('active', (l.tags || []).includes(t.dataset.tag)));

  document.getElementById('submit-btn').textContent = 'Update Lineup';
  document.getElementById('cancel-edit-btn').style.display = 'block';
  setStatus('Editing — adjust and click Update Lineup.', 'var(--green)');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  loadRecent();
}

function cancelEdit() {
  editingId = null;
  document.getElementById('submit-btn').textContent = 'Save Lineup';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  clearMarkers();
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-yt').value = '';
  document.getElementById('yt-preview').classList.remove('visible');
  document.querySelectorAll('.tag.active').forEach(t => t.classList.remove('active'));
  ytId = null;
  loadRecent();
}

// Re-render markers on window resize
window.addEventListener('resize', () => { if (standPos || landPos) renderMarkers(); });
</script>
